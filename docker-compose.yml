name: fellside-digital

services:
  fellsidedigital:
    container_name: fellside_digital_web
    image: ${DOCKER_REGISTRY-}fellsidedigital
    build:
      context: ./src
      dockerfile: FellsideDigital.Web/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      
      - Email__TenantId=${TENANT_ID}
      - Email__ClientId=${CLIENT_ID}
      - Email__ClientSecret=${CLIENT_SECRET}

      # ServiceUrl is used by the app *inside* the container to talk to MinIO, so it must
      # be the service hostname on the compose network — not localhost (that's the web
      # container itself). PublicUrl stays localhost:9000 because it's only used to sign
      # presigned URLs the browser (on the host) will open.
      - Storage__ServiceUrl=http://fellsidedigital-storage:9000
      - Storage__PublicUrl=http://localhost:8080
      - Storage__AccessKey=minioadmin
      - Storage__SecretKey=minioadmin
    ports:
      - "8085:8080"
    depends_on:
      fellsidedigital-postgres:
        condition: service_healthy
      fellsidedigital-storage:
        condition: service_started
    volumes:
      - keys_volume:/app/keys

  fellsidedigital-postgres:
    image: postgres:15
    container_name: fellsidedigital_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  fellsidedigital-storage:
    image: minio/minio:latest
    container_name: fellsidedigital_storage
    # Create the bucket on first boot, then hand off to the server. Single-drive MinIO
    # exposes top-level data dirs as buckets, so this removes the separate init container.
    entrypoint: ["sh", "-c", "mkdir -p /data/fellside-digital && exec minio server /data --console-address ':9001'"]
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"   # S3 API  — http://localhost:9000
      - "9001:9001"   # Web UI  — http://localhost:9001  (login: minioadmin / minioadmin)
    volumes:
      - minio_data:/data

volumes:
  pgdata:
    name: fellside-digital_pgdata
  keys_volume:
    name: fellside-digital_keys_volume
  minio_data:
    name: fellside-digital_minio_data
